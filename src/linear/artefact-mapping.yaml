# ARIA Artefact-to-Linear Mapping
# Authoritative reference for how each ARIA artefact maps to Linear.
# Agents consult this file to determine which MCP tool to call for each output.
# All output goes exclusively to Linear — no local file writes.

# ============================================================================
# PHASE 1 — ANALYSIS (Analyst Agent / Cadence)
# ============================================================================

phase_1_analysis:

  research_report:
    destination: linear_document
    mcp_tool: create_document
    parameters:
      title: "{project_name} - Research: {research_type}"
      content: "{report_body_markdown}"
      project: "{project_id}"       # optional, link to project if exists
    labels: []                       # Linear documents do not support labels
    key_map_id: "documents.research_{type}"
    notes: "One document per research type (market, domain, technical)"

  product_brief:
    destination: linear_document
    mcp_tool: create_document
    parameters:
      title: "{project_name} - Product Brief"
      content: "{brief_body_markdown}"
      project: "{project_id}"
    labels: []
    key_map_id: "documents.brief"
    notes: "Input document for PRD creation. Created once, updated if revised."

  brainstorming:
    destination: linear_document
    mcp_tool: create_document
    parameters:
      title: "{project_name} - Brainstorming: {session_topic}"
      content: "{brainstorming_body_markdown}"
      project: "{project_id}"
    labels: []
    key_map_id: "documents.brainstorming"
    notes: "Divergent ideation session. Ideas organized by theme/category with convergence picks."

  project_context:
    destination: linear_document
    mcp_tool: create_document
    parameters:
      title: "{project_name} - Project Context"
      content: "{project_context_body_markdown}"
      project: "{project_id}"
    labels: []
    key_map_id: "documents.project_context"
    local_copy: "project-context.md"
    notes: "Lean LLM-optimized codebase summary. Also saved locally for fast agent access during implementation."

  project_documentation:
    destination: linear_document
    mcp_tool: create_document
    parameters:
      title: "{project_name} - Documentation"
      content: "{documentation_body_markdown}"
      project: "{project_id}"
    labels: []
    key_map_id: "documents.documentation"
    notes: "Brownfield project documentation. Scans existing codebase and produces structured docs."

# ============================================================================
# PHASE 2 — PLANNING (PM Agent / Maestro + UX Designer / Lyric)
# ============================================================================

phase_2_planning:

  prd:
    destination: linear_document
    mcp_tool: create_document
    parameters:
      title: "{project_name} - PRD"
      content: "{prd_body_markdown}"
      project: "{project_id}"
    labels: []
    key_map_id: "documents.prd"
    project_linking:
      description: "After creating PRD document, link it to each project's description via save_project"
      mcp_tool: save_project
      parameters:
        id: "{project_id}"
        description: "{existing_description}\n\n---\n## Related Documents\n- PRD: {document_title}"

  epics:
    destination: linear_project
    description: "Each Epic heading becomes a Linear Project"
    creation_flow:
      - step: 1
        action: "Parse epic headings from markdown"
        pattern: "## Epic {N}: {title}"
      - step: 2
        action: "Create Linear Project"
        mcp_tool: save_project
        parameters:
          name: "Epic {N}: {title}"
          description: "{epic_goal_and_fr_coverage}"
          addTeams: ["{linear_team_id}"]
          state: "planned"
          labels: []
      - step: 3
        action: "Store project ID in .linear-key-map.yaml"
        key_map_id: "projects.epic-{N}: {created_project_id}"

  stories:
    destination: linear_issue
    description: "Each Story under an Epic becomes a Linear Issue linked to the parent Project"
    creation_flow:
      - step: 1
        action: "Parse story entries from epic section"
        pattern: "### Story {N}.{M}: {title}"
      - step: 2
        action: "Create Linear Issue"
        mcp_tool: save_issue
        parameters:
          title: "Story {N}.{M}: {title}"
          team: "{linear_team_name}"
          description: |
            **User Story:**
            As a {user_type}, I want {capability}, so that {value_benefit}.

            **Acceptance Criteria:**
            {acceptance_criteria_given_when_then}
          project: "{project_id}"
          state: "Backlog"
          labels:
            - "aria-agent-pm"
    assignee_resolution:
      condition: "If {default_assignee} is configured (non-empty)"
      action: "Resolve username via list_users, pass user ID as assignee param to save_issue"
      mcp_tool: list_users
      parameters:
        query: "{default_assignee}"
      result_field: "assignee: {resolved_user_id}"
    project_linking:
      description: "Issues are linked to Projects via the project field on save_issue"
      parameter: "project: {parent_project_id}"
      - step: 3
        action: "Store issue ID in .linear-key-map.yaml"
        key_map_id: "issues.{N}-{M}-{kebab_title}: {created_issue_id}"

  prd_validation:
    destination: linear_issue_comment
    description: "Validation findings posted as comments on relevant issues"
    execution_flow:
      - step: 1
        action: "Find PRD document via list_documents with query"
        mcp_tool: list_documents
        parameters:
          query: "{project_name} - PRD"
      - step: 2
        action: "Validate PRD against prd-checklist"
      - step: 3
        action: "Post findings as comment on a representative issue"
        mcp_tool: save_comment
      - step: 4
        action: "Post verdict (PASS/PASS WITH NOTES/NEEDS REVISION)"
        mcp_tool: save_comment
    notes: "Read-only on PRD document content. Findings posted as issue comments."

  prd_edit:
    destination: linear_document
    description: "Updates existing PRD document content based on feedback"
    execution_flow:
      - step: 1
        action: "Find PRD document via key map or list_documents"
        mcp_tool: list_documents
      - step: 2
        action: "Load PRD content and any feedback"
        mcp_tool: get_document
      - step: 3
        action: "Make targeted edits to the PRD"
        mcp_tool: update_document
    notes: "Preserves PRD structure. Only modifies sections that need updating."

  ux_design:
    destination: linear_document
    mcp_tool: create_document
    parameters:
      title: "{project_name} - UX Design"
      content: "{ux_design_body_markdown}"
      project: "{project_id}"
    labels: []
    key_map_id: "documents.ux"
    project_linking:
      description: "Add UX Design reference to each project's description via save_project"
      mcp_tool: save_project
      parameters:
        id: "{project_id}"
        description: "{existing_description}\n\n---\n## Related Documents\n- UX Design: {document_title}"

# ============================================================================
# PHASE 3 — SOLUTIONING (Architect Agent / Opus)
# ============================================================================

phase_3_solutioning:

  architecture_decision_doc:
    destination: linear_document
    mcp_tool: create_document
    parameters:
      title: "{project_name} - Architecture"
      content: "{architecture_body_markdown}"
      project: "{project_id}"
    labels: []
    key_map_id: "documents.architecture"
    project_linking:
      description: "Add Architecture reference to relevant project descriptions"
      mcp_tool: save_project
      parameters:
        id: "{project_id}"
        description: "{existing_description}\n\n---\n## Related Documents\n- Architecture: {document_title}"

  readiness_report:
    destination: linear_document
    mcp_tool: create_document
    parameters:
      title: "{project_name} - Implementation Readiness Report"
      content: "{readiness_body_markdown}"
      project: "{project_id}"
    labels: []
    key_map_id: "documents.readiness"
    feedback_mechanism:
      description: "Posts comments on relevant issues for specific findings"
      mcp_tool: save_comment
      notes: "Creates targeted feedback visible on source issues, enabling tighter feedback loops"
    notes: "Cross-references PRD, architecture, and projects/issues for completeness check"

  # --- Security Engineer (Forte) ---

  threat_model:
    destination: linear_document
    mcp_tool: create_document
    parameters:
      title: "{project_name} - Threat Model"
      content: "{threat_model_body_markdown}"
      project: "{project_id}"
    labels: []
    key_map_id: "documents.threat_model"
    notes: "STRIDE-based threat analysis. Created after architecture, reviewed by Architect."

  security_audit:
    destination: linear_issue_comment
    description: "Security audit findings posted as structured comments on relevant issues"
    execution_flow:
      - step: 1
        action: "Scan codebase for vulnerability patterns"
      - step: 2
        action: "Check dependency manifests for known vulnerabilities"
      - step: 3
        action: "Post findings as structured comments (severity, CWE, evidence, fix)"
        mcp_tool: save_comment
    notes: "Each finding includes severity, CWE ID, file:line, evidence, and recommended fix"

  security_review:
    destination: linear_issue_comment
    description: "Security architecture review findings posted as issue comments"
    execution_flow:
      - step: 1
        action: "Load architecture document from Linear"
        mcp_tool: get_document
      - step: 2
        action: "Review for auth, data protection, network security, supply chain"
      - step: 3
        action: "Post findings as issue comments"
        mcp_tool: save_comment
    notes: "Reviews architecture document for security concerns. Posts findings on relevant issues."

  # --- Data Engineer (Harmony) ---

  data_model:
    destination: linear_document
    mcp_tool: create_document
    parameters:
      title: "{project_name} - Data Model"
      content: "{data_model_body_markdown}"
      project: "{project_id}"
    labels: []
    key_map_id: "documents.data_model"
    notes: "ERD and schema design. Includes Mermaid diagrams, indexes, constraints."

  data_pipeline:
    destination: linear_document
    mcp_tool: create_document
    parameters:
      title: "{project_name} - Data Pipeline Design: {pipeline_name}"
      content: "{pipeline_body_markdown}"
      project: "{project_id}"
    labels: []
    key_map_id: "documents.data_pipeline"
    notes: "ETL/ELT pipeline design with sources, transforms, scheduling."

  data_migration:
    destination: linear_document
    mcp_tool: create_document
    parameters:
      title: "{project_name} - Data Migration Plan: {migration_name}"
      content: "{migration_body_markdown}"
      project: "{project_id}"
    labels: []
    key_map_id: "documents.data_migration"
    notes: "Migration strategy with rollback procedure and data validation."

# ============================================================================
# PHASE 4 — IMPLEMENTATION (SM / Tempo, Dev / Riff, QA / Pitch)
# ============================================================================

phase_4_implementation:

  sprint:
    destination: linear_cycle
    description: "Sprint planning via Linear Cycles"
    execution_flow:
      - step: 1
        action: "Find active cycle"
        mcp_tool: list_cycles
        parameters:
          teamId: "{linear_team_id}"
          type: "current"
      - step: 2
        action: "Assign issues to the cycle via save_issue"
        mcp_tool: save_issue
        parameters:
          id: "{issue_id}"
          cycle: "{cycle_id}"
      - step: 3
        action: "If no current cycle, guide user to create one in Linear UI"
    notes: "Cycles must be pre-created in Linear. ARIA assigns issues to existing cycles."

  story_preparation:
    destination: linear_issue
    description: "SM prepares story by enriching the Linear Issue description with dev context"
    execution_flow:
      - step: 1
        action: "Look up issue from key map"
        lookup: "issues.{story-key}"
      - step: 2
        action: "Update issue description with dev context"
        mcp_tool: save_issue
        parameters:
          id: "{issue_id}"
          description: "{enriched_story_description}"
      - step: 3
        action: "Add dev notes as comment"
        mcp_tool: save_comment
        parameters:
          issueId: "{issue_id}"
          body: "{dev_notes_and_references}"
      - step: 4
        action: "Set state to ready"
        mcp_tool: save_issue
        parameters:
          id: "{issue_id}"
          state: "{status_names.todo}"

  story_tasks:
    destination: linear_issue
    description: "Each task in the story becomes a Linear sub-issue"
    creation_flow:
      - step: 1
        action: "Parse tasks from story content"
      - step: 2
        action: "Create sub-issue for each task"
        mcp_tool: save_issue
        parameters:
          title: "{task_description}"
          team: "{linear_team_name}"
          description: "{task_details_and_ac_refs}"
          parentId: "{parent_issue_id}"
          project: "{project_id}"
          labels:
            - "aria-agent-sm"

  dev_story_execution:
    destination: linear_issue
    description: "Dev agent transitions issues and posts completion notes"
    execution_flow:
      - step: 1
        action: "Find next issue to implement"
        mcp_tool: list_issues
        parameters:
          team: "{linear_team_name}"
          state: "{status_names.todo}"
          limit: 1
          orderBy: "priority"
      - step: 2
        action: "Lock the issue"
        invoke_task: "lock-issue"
        parameters:
          issue_id: "{issue_id}"
          action: "lock"
      - step: 3
        action: "Set state to In Progress"
        mcp_tool: save_issue
        parameters:
          id: "{issue_id}"
          state: "{status_names.in_progress}"
      - step: 4
        action: "Post completion record as comment"
        mcp_tool: save_comment
        parameters:
          issueId: "{issue_id}"
          body: |
            **Dev Agent Record**
            - Agent Model: {agent_model}
            - Files Changed: {file_list}
            - Completion Notes: {completion_notes}
      - step: 5
        action: "Link PR if git_enabled"
        invoke_task: "link-pr-to-issue"
        parameters:
          issue_id: "{issue_id}"
          pr_url: "{pr_url}"
          pr_title: "{pr_title}"
      - step: 6
        action: "Set state to In Review"
        mcp_tool: save_issue
        parameters:
          id: "{issue_id}"
          state: "{status_names.in_review}"
      - step: 7
        action: "Unlock the issue"
        invoke_task: "lock-issue"
        parameters:
          issue_id: "{issue_id}"
          action: "unlock"

  code_review:
    destination: linear_issue_comment
    description: "Code review findings posted as Linear comment on the issue"
    execution_flow:
      - step: 1
        action: "Post review findings"
        mcp_tool: save_comment
        parameters:
          issueId: "{issue_id}"
          body: "{code_review_markdown}"
      - step: 2
        action: "If review passes, set state to Done"
        mcp_tool: save_issue
        parameters:
          id: "{issue_id}"
          state: "{status_names.done}"
      - step: 3
        action: "If review fails, set state back to In Progress and add review-failed label"
        mcp_tool: save_issue
        parameters:
          id: "{issue_id}"
          state: "{status_names.in_progress}"
          labels: [{existing_labels}, "aria-review-failed"]

  qa_testing:
    destination: linear_issue
    description: "QA test results posted as comments, reports attached"
    execution_flow:
      - step: 1
        action: "Post test findings as comment"
        mcp_tool: save_comment
        parameters:
          issueId: "{issue_id}"
          body: "{qa_findings_markdown}"
      - step: 2
        action: "Attach test/coverage reports"
        invoke_task: "attach-report"
        parameters:
          issue_id: "{issue_id}"
          file_path: "{report_path}"
          filename: "{report_filename}"
          content_type: "{content_type}"
      - step: 3
        action: "Apply tested label"
        mcp_tool: save_issue
        parameters:
          id: "{issue_id}"
          labels: [{existing_labels}, "aria-tested"]

  retrospective:
    destination: linear_document
    description: "Project retrospective findings posted to Linear Document, summary on project issues"
    mcp_tool: create_document
    parameters:
      title: "{project_name} - Retrospective: {project_epic_title}"
      content: "{retrospective_body_markdown}"
      project: "{project_id}"
    labels: []
    key_map_id: "documents.retrospective_{project_id}"
    notes: "Also posts summary comment on representative project issue and updates project state to completed if all issues are done"

  correct_course:
    destination: linear_issue
    description: "Course correction changes posted as comments on affected Linear issues"
    execution_flow:
      - step: 1
        action: "Assess current cycle state"
        mcp_tool: list_issues
        parameters:
          team: "{linear_team_name}"
          cycle: "{current_cycle_id}"
      - step: 2
        action: "Post Change Proposal as comment on affected issues"
        mcp_tool: save_comment
      - step: 3
        action: "Create new remediation issues if needed"
        mcp_tool: save_issue
      - step: 4
        action: "Update existing issue descriptions/ACs"
        mcp_tool: save_issue

  quick_spec:
    destination: linear_issue
    description: "Single Linear Issue with embedded tech spec — skips Project structure"
    creation_flow:
      - step: 1
        action: "Create Linear Issue with tech spec in description"
        mcp_tool: save_issue
        parameters:
          title: "{spec_title}"
          team: "{linear_team_name}"
          description: "{full_tech_spec_markdown}"
          labels:
            - "aria-quick"
    notes: "One-off tasks without full planning. No Project required."

  quick_dev:
    destination: linear_issue
    description: "Implements a quick-spec issue directly — skips code review"
    execution_flow:
      - step: 1
        action: "Find quick-spec issue"
        mcp_tool: list_issues
        parameters:
          team: "{linear_team_name}"
          label: "aria-quick"
          state: "{status_names.todo}"
      - step: 2
        action: "Implement and set state to Done (skips Review)"
        mcp_tool: save_issue
        parameters:
          id: "{issue_id}"
          state: "{status_names.done}"
    notes: "Fast path for one-off tasks. Transitions directly to Done."

# ============================================================================
# PHASE 5 — RELEASE (DevOps / Coda)
# ============================================================================

phase_5_release:

  release_plan:
    destination: linear_document
    mcp_tool: create_document
    parameters:
      title: "{project_name} - Release Plan: v{version}"
      content: "{release_plan_body_markdown}"
      project: "{project_id}"
    labels: []
    key_map_id: "documents.release_plan"
    milestone_linking:
      description: "Create or update a Linear Milestone for the release"
      mcp_tool: save_milestone
      parameters:
        name: "v{version}"
        description: "{release_summary}"
        targetDate: "{target_date}"
    notes: "Version planning, changelog, deployment checklist. Links to Milestone."

  cicd_design:
    destination: linear_document
    mcp_tool: create_document
    parameters:
      title: "{project_name} - CI/CD Pipeline Design"
      content: "{cicd_body_markdown}"
      project: "{project_id}"
    labels: []
    key_map_id: "documents.cicd_design"
    notes: "Pipeline stages, quality gates, environment strategy."

  deploy_strategy:
    destination: linear_document
    mcp_tool: create_document
    parameters:
      title: "{project_name} - Deployment Strategy"
      content: "{deploy_body_markdown}"
      project: "{project_id}"
    labels: []
    key_map_id: "documents.deploy_strategy"
    notes: "Deployment approach (blue-green, canary, rolling), health checks, rollback."

# ============================================================================
# CROSS-AGENT COMMUNICATION
# ============================================================================

cross_agent:

  adversarial_review:
    destination: linear_document_or_issue
    description: "Cynical review findings posted as Linear issue comments"
    task: "tasks/review-adversarial.md"
    execution_flow:
      - step: 1
        action: "Load target (Linear document or issue)"
        mcp_tools: [get_document, get_issue]
      - step: 2
        action: "Review content critically, find 10+ issues"
      - step: 3
        action: "Post findings as issue comment"
        mcp_tool: save_comment
    notes: "Can target any Linear document or issue. Invoked standalone or by other workflows."

  editorial_review_prose:
    destination: linear_issue_comment
    description: "Prose quality review posted as Linear issue comment"
    task: "tasks/editorial-review-prose.md"
    execution_flow:
      - step: 1
        action: "Load Linear document"
        mcp_tool: get_document
      - step: 2
        action: "Review prose clarity, tone, communication"
      - step: 3
        action: "Post three-column table (Location/Issue/Suggested Fix) as issue comment"
        mcp_tool: save_comment

  editorial_review_structure:
    destination: linear_issue_comment
    description: "Document structure review posted as Linear issue comment"
    task: "tasks/editorial-review-structure.md"
    execution_flow:
      - step: 1
        action: "Load Linear document"
        mcp_tool: get_document
      - step: 2
        action: "Analyze organization, propose reorganization"
      - step: 3
        action: "Post findings with [NEW]/[CUT]/[MOVED]/[MERGED] annotations as issue comment"
        mcp_tool: save_comment

  edge_case_review:
    destination: linear_issue_comment
    description: "Edge case findings posted as Linear comment on the relevant issue"
    task: "tasks/review-edge-cases.md"
    execution_flow:
      - step: 1
        action: "Walk branching paths in referenced code"
      - step: 2
        action: "Post findings with file:line references as issue comment"
        mcp_tool: save_comment
    notes: "Method-driven, not attitude-driven. Orthogonal coverage to adversarial review."

  party_mode:
    destination: linear_document
    description: "Multi-agent discussion summary optionally posted to Linear Document"
    mcp_tool: create_document
    parameters:
      title: "{project_name} - Party Mode: {topic}"
      content: "{discussion_summary_markdown}"
    labels: []
    notes: "Conversation-only by default. Optionally exports summary to Linear Document."

  handoff_notification:
    destination: linear_issue_comment
    description: "Structured handoff comment posted on Linear issues when work passes between agents"
    task: "tasks/post-handoff.md"
    mcp_tool: save_comment
    label_applied: "aria-handoff-{target_agent}"
    notes: "Orchestrator scans for aria-handoff-* labels to detect pending handoffs"

  lock:
    destination: linear_issue_label
    description: "Agent lock/unlock via label on Linear issues"
    task: "tasks/lock-issue.md"
    mcp_tools: [get_issue, save_issue, save_comment]
    label: "{lock_label}"
    notes: "Prevents multiple agents from working on the same issue simultaneously"

  dashboard:
    destination: linear_document
    description: "Project status dashboard as a Linear Document"
    task: "tasks/update-project-dashboard.md"
    mcp_tools: [list_projects, list_issues, list_cycles, list_documents, create_document, update_document]
    key_map_id: "documents.dashboard"
    notes: "Idempotent — updates existing dashboard document if one exists"
