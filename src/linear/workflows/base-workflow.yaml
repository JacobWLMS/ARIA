# Base workflow config — inherited by all Linear workflow YAMLs
# Individual workflows override name/description/author and add unique fields.

# Config source
config_source: "{project-root}/_aria/linear/module.yaml"

# User preferences
user_name: "{config_source}:user_name"
communication_language: "{config_source}:communication_language"
document_output_language: "{config_source}:document_output_language"
user_skill_level: "{config_source}:user_skill_level"
date: system-generated

# Linear-specific config
linear_team_name: "{config_source}:linear_team_name"
linear_team_id: "{config_source}:linear_team_id"
key_map_file: "{config_source}:key_map_file"
agent_label_prefix: "{config_source}:agent_label_prefix"
status_names: "{config_source}:status_names"
default_assignee: "{config_source}:default_assignee"
project_prefix: "{config_source}:project_prefix"
use_cycles: "{config_source}:use_cycles"

# Reusable tasks
context_task: "{project-root}/_aria/linear/tasks/read-linear-context.md"
state_task: "{project-root}/_aria/linear/tasks/set-issue-state.md"
lock_task: "{project-root}/_aria/linear/tasks/lock-issue.md"
handoff_task: "{project-root}/_aria/linear/tasks/post-handoff.md"
write_doc_task: "{project-root}/_aria/linear/tasks/write-to-linear-doc.md"
help_task: "{project-root}/_aria/linear/tasks/help.md"
git_task: "{project-root}/_aria/shared/tasks/git-operations.md"
attach_report_task: "{project-root}/_aria/linear/tasks/attach-report.md"
link_pr_task: "{project-root}/_aria/linear/tasks/link-pr-to-issue.md"
create_project_task: "{project-root}/_aria/linear/tasks/create-project-epic.md"

# Tracking system
tracking_system: "linear"
